    var graph = new LGraph("test");
    function save() {
      graph.saveFile();
    }
    function load() {
      graph.loadFile();
    }

    var canvas = new LGraphCanvas("#mycanvas", graph);


    var rimage = LiteGraph.createNode("rast/image");
    rimage.pos = [10, 100];
    graph.add(rimage);

    var rimage2 = LiteGraph.createNode("rast/image");
    rimage2.pos = [10, 300];
    graph.add(rimage2);

    var blend = LiteGraph.createNode("rast/blend");
    blend.pos = [300, 200];
    graph.add(blend);

    var frame = LiteGraph.createNode("rast/frame");
    frame.pos = [500, 100];
    graph.add(frame);

    rimage.connect(0, blend, 0);
    rimage2.connect(0, blend, 1);
    blend.connect(0, frame, 0);


    var rp5 = LiteGraph.createNode("rast/p5");
    graph.add(rp5);
