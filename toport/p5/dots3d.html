<!DOCTYPE html>
<html>

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.sound.min.js"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }

    canvas {
      display: block;
    }
  </style>

</head>

<body>
  <script>
    const w = 500;
    const h = 500;

    const bg = 255;
    const color = 0;

    //utility
    let img;
    let tiles = 0;
    let tileSize = 0;
    let col; //color
    let b; //brightness
    let circleSize; //size of ellipse
    let z;

    // State
    const colorMode = false;
    const threeDMode = false;

    function preload() {
      img = loadImage('../img/mm1.jpg');

    }

    function setup() {
      img.resize(w, h);
      createCanvas(w, h, WEBGL);
      noStroke();
      fill(color);
    }

    function draw() {
      background(bg);
      tiles = int(map(mouseX, 0, w, 1, 100));
      tileSize = w / tiles;
      if (threeDMode) {
        rotateY(map(mouseY, 0, h, 0, PI));
      }
      translate(-w / 2 + tileSize / 2, -w / 2 + tileSize / 2);

      for (let x = 0; x < tiles; x++) {
        for (let y = 0; y < tiles; y++) {
          col = img.get(int(x * tileSize), int(y * tileSize));
          if (colorMode) {
            fill(col);
          }
          circleSize = map(brightness(col), 0, 100, tileSize, 0);

          if (threeDMode) {
            z = map(brightness(col), 0, 100, -w / 4, w / 4)
            translate(x * tileSize, y * tileSize, z);
            //ellipse(x*tileSize, y*tileSize, circleSize, circleSize);
            sphere(circleSize, 5, 5);
            translate(-x * tileSize, -y * tileSize, -z);
          }
          else {
            ellipse(x * tileSize, y * tileSize, circleSize, circleSize);
          }
        }
      }
    }


  </script>
</body>

</html>
