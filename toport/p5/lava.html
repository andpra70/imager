<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />

</head>

<body>
  <main>
  </main>
  <script>
    /*
----- Coding Tutorial by Patt Vira ----- 
Name: Lava Lamp (Marching Squares)
Video Tutorial: https://youtu.be/lEiXBA_xHOQ?si=emc1zpdk-wrFQEdJ

Connect with Patt: @pattvira
https://www.pattvira.com/
----------------------------------------
*/

    let val;

    let cols; let rows; let size = 20;
    let grid = [];

    let circles = [];
    let num = 10;


    class Circle {
      constructor() {
        this.x = random(0, width);
        this.y = random(0, height);
        this.r = random(20, 50);
        this.dx = 2;
        this.dy = 1;
      }

      move() {
        this.x += this.dx;
        this.y += this.dy;

        if (this.x >= width || this.x < 0) {
          this.dx *= -1;
        }
        if (this.y >= height || this.y < 0) {
          this.dy *= -1;
        }
      }

      display() {
        noFill();
        ellipse(this.x, this.y, this.r * 2, this.r * 2);
      }
    }
    function setup() {
      createCanvas(800, 800);
      cols = width / size + 1;
      rows = height / size + 1;

      for (let i = 0; i < cols; i++) {
        grid[i] = [];
        for (let j = 0; j < rows; j++) {
          grid[i][j] = 0;
        }
      }

      for (let i = 0; i < num; i++) {
        circles[i] = new Circle();
      }
    }

    function draw() {
      background(220);

      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          let val = 0;
          for (let k = 0; k < num; k++) {
            val += circles[k].r * circles[k].r / ((i * size - circles[k].x) * (i * size - circles[k].x) + (j * size - circles[k].y) * (j * size - circles[k].y));
          }
          grid[i][j] = val;

          fill(255);
          // rect(i*size, j*size, size, size)

          if (val >= 1) {
            fill(0, 255, 0);
          } else {
            fill(0);
          }

          // ellipse(i * size, j * size, 5, 5);
          // text(round(val, 2), i*size, j*size - 10);
        }
      }

      for (let i = 0; i < num; i++) {
        circles[i].move();
        // circles[i].display();
      }

      for (let i = 0; i < cols - 1; i++) {
        for (let j = 0; j < rows - 1; j++) {
          let a = 0; let b = 0; let c = 0; let d = 0;
          let f_a = grid[i][j];
          let f_b = grid[i + 1][j];
          let f_c = grid[i + 1][j + 1];
          let f_d = grid[i][j + 1];

          if (f_a >= 1) {
            a = 1;
          } else {
            a = 0;
          }
          if (f_b >= 1) {
            b = 1;
          } else {
            b = 0;
          }
          if (f_c >= 1) {
            c = 1;
          } else {
            c = 0;
          }
          if (f_d >= 1) {
            d = 1;
          } else {
            d = 0;
          }

          let config = 8 * a + 4 * b + 2 * c + 1 * d;

          // let pt1 = createVector(i*size + size/2, j*size);
          // let pt2 = createVector(i*size + size, j*size + size/2);
          // let pt3 = createVector(i*size + size/2, j*size + size);
          // let pt4 = createVector(i*size, j*size + size/2);

          let pt1 = createVector();
          let amt = (1 - f_a) / (f_b - f_a);
          pt1.x = lerp(i * size, i * size + size, amt);
          pt1.y = j * size;

          let pt2 = createVector();
          amt = (1 - f_b) / (f_c - f_b);
          pt2.x = i * size + size;
          pt2.y = lerp(j * size, j * size + size, amt);

          let pt3 = createVector();
          amt = (1 - f_d) / (f_c - f_d);
          pt3.x = lerp(i * size, i * size + size, amt);
          pt3.y = j * size + size;

          let pt4 = createVector();
          amt = (1 - f_a) / (f_d - f_a);
          pt4.x = i * size;
          pt4.y = lerp(j * size, j * size + size, amt);

          switch (config) {
            case 0:
              break;
            case 1:
              line(pt3.x, pt3.y, pt4.x, pt4.y);
              break;
            case 2:
              line(pt2.x, pt2.y, pt3.x, pt3.y);
              break;
            case 3:
              line(pt2.x, pt2.y, pt4.x, pt4.y);
              break;
            case 4:
              line(pt1.x, pt1.y, pt2.x, pt2.y);
              break;
            case 5:
              line(pt1.x, pt1.y, pt4.x, pt4.y);
              line(pt2.x, pt2.y, pt3.x, pt3.y);
              break;
            case 6:
              line(pt1.x, pt1.y, pt3.x, pt3.y);
              break;
            case 7:
              line(pt1.x, pt1.y, pt4.x, pt4.y);
              break;
            case 8:
              line(pt1.x, pt1.y, pt4.x, pt4.y);
              break;
            case 9:
              line(pt1.x, pt1.y, pt3.x, pt3.y);
              break;
            case 10:
              line(pt1.x, pt1.y, pt2.x, pt2.y);
              line(pt3.x, pt3.y, pt4.x, pt4.y);
              break;
            case 11:
              line(pt1.x, pt1.y, pt2.x, pt2.y);
              break;
            case 12:
              line(pt2.x, pt2.y, pt4.x, pt4.y);
              break;
            case 13:
              line(pt2.x, pt2.y, pt3.x, pt3.y);
              break;
            case 14:
              line(pt3.x, pt3.y, pt4.x, pt4.y);
              break;
            case 15:
              break;
          }

        }
      }


    }

  </script>
</body>

</html>
