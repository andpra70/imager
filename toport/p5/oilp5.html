<!DOCTYPE html>
<html>

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.sound.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
        }
    </style>

</head>

<body>
    <script>
        /*
        portrait painter p5 version
        
        Mimics a brush's stroke to paint a portrait.
        
        Author:
          Jason Labbe
        
        Transcompiled by:
            jjwkdl
        
        Site:
          jasonlabbe3d.com
        */

        let img;
        let n = 0;
        let count=0;

        function paintStroke(strokeLength, strokeColor, strokeThickness) {
            let stepLength = strokeLength / 30.0;

            // Determines if the stroke is curved. A straight line is 0.
            let tangent1 = 0;
            let tangent2 = 0;

            let odds = random();

            if (odds < 1) {
                tangent1 = random(-strokeLength, strokeLength);
                tangent2 = random(-strokeLength, strokeLength);
            }

            // Draw a big stroke
            noFill();
            stroke(strokeColor);
            strokeWeight(strokeThickness);
            curve(tangent1, -stepLength * 2, 0, -stepLength, 0, stepLength, tangent2, stepLength * 2);
            // console.log(n++);

            let z = 1;

            // Draw stroke's details
            for (let num = strokeThickness; num > 0; num--) {
                let offset = random(-50, 25);
                let newColor = color(red(strokeColor) + offset, green(strokeColor) + offset, blue(strokeColor) + offset, random(100, 255));

                stroke(newColor);
                strokeWeight(floor(random(1, 1)));
                curve(tangent1, -stepLength * 2, z - strokeThickness / 2, -stepLength * random(0.9, 1.1), z - strokeThickness / 2, stepLength * random(0.9, 1.1), tangent2, stepLength * 2);

                z += 1;
            }

            count++;
            
        }

        function preload() {
            let imgName = '../img/car' + floor(random(1, 30)) + ".jpg";
            console.log(imgName);
            // img = loadImage('./img/b.jpg');
            img = loadImage(imgName);
        }

        function setup() {
            img.loadPixels();
            console.log('W=' + img.width);
            console.log('H=' + img.height);
            createCanvas(img.width, img.height);
        }


        function draw() {
            translate(width / 2, height / 2);

            let index = 0;
            let randomness=width*height/1000;
            console.log(randomness);
            console.log('count ' +count);
            for (let y = 0; y < img.height; y += 1) {
                for (let x = 0; x < img.width; x += 1) {
                    let odds = floor(random(randomness));

                    if (odds < 1) {
                        let pixelColorR = img.pixels[index];
                        let pixelColorG = img.pixels[index + 1];
                        let pixelColorB = img.pixels[index + 2];
                        let pixelColor = color(pixelColorR, pixelColorG, pixelColorB);
                        pixelColor = color(red(pixelColor), green(pixelColor), blue(pixelColor), 127);

                        push();
                        translate(x - img.width / 2, y - img.height / 2);
                        rotate(radians(random(-45, 45)));

                        // Paint by layers from rough strokes to finer details
                        if (frameCount < 20) {
                            // Big rough strokes
                            paintStroke(random(150, 200), pixelColor, floor(random(20, 40)));
                        } else if (frameCount < 150) {
                            // Thick strokes
                            paintStroke(random(75, 100), pixelColor, floor(random(8, 12)));
                        } else if (frameCount < 300) {
                            // Small strokes
                            paintStroke(random(32, 50), pixelColor, floor(random(1, 4)));
                        } else if (frameCount < 400) {
                            // Big dots
                            paintStroke(random(5, 20), pixelColor, floor(random(5, 15)));
                        } else if (frameCount < 600) {
                            // Small dots
                            paintStroke(random(1, 15), pixelColor, floor(random(1, 7)));
                        }

                        pop();
                    }

                    index += 4;
                }
            }

            if (frameCount > 600) {
                noLoop();
                console.log('finished ' +count);
            }
        }

    </script>
</body>

</html>
