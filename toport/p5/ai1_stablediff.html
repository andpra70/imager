<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/addons/p5.sound.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />

</head>

<body>
  <main>
  </main>
  <script>

    let url = "https://dezgo.p.rapidapi.com/image2image";
    let encodedParams = {};
    let options = {
      method: "POST",
      headers: {
        "content-type": "application/x-www-form-urlencoded",
        "X-RapidAPI-Key": "6f13b60073msha5b5c10f8936817p1edcedjsna7295272c5a4",
        "X-RapidAPI-Host": "dezgo.p.rapidapi.com",
      },
    };
    let myButton, myInput, myCanvas, data, myFile, myBlob;

    function setup() {
      myCanvas = createCanvas(512, 512);
      myCanvas.drop(gotFile);
      background(200);

      myButton = createButton('Submit');
      myButton.position(512, 520);
      myButton.mousePressed(getImage);
      myButton.elt.style.fontSize = '20px';

      myInput = createInput("an astronaut riding a horse, digital art, highly-detailed masterpiece trending HQ");
      myInput.position(0, 520);
      myInput.size(500);
      myInput.elt.style.fontSize = '20px';

      data = new FormData();
      data.append("guidance", "7.5");
      data.append("strength", "0.8");
      data.append("prompt", "an astronaut riding a horse, digital art, highly-detailed masterpiece trending HQ");
      data.append("sampler", "k_lms");
      data.append("steps", "50");
    }

    function getImage() {
      const inputValue = myInput.value();
      console.log('myinput', inputValue);
      if (!inputValue || inputValue.length <= 0) {
        return;
      }
      console.log('data', data);
      myBlob = myCanvas.elt.toBlob(continueGettingimage);
    }

    function continueGettingimage(myBlob) {
      console.log('myBlob', myBlob)
      data.append("init_image", myBlob, 'input.jpg');
      // data.prompt = inputValue;

      options.body = data;
      fetch(url, options)
        .then((response) => {
          console.log('response', response)
          const blob = response.blob();
          return blob;
        })
        .then((blob) => blobToB64(blob))
        .then((imageData) => {
          console.log('imageData', imageData)
          drawImage(imageData);
        })
        .catch((err) => console.error(err));
    }

    function gotFile(file) {
      myFile = file;
      background(0);
      var img = createImg(file.data, file.name);
      img.hide();//Hide image element in dom
      console.log('img', img)
      image(img, 0, 0, width, height);
      // fill(255);
      // textSize(16);
      // textAlign(CENTER);
      // text("Type of File: "+file.type, width / 2, height - 70);
      // text("File Name: "+file.name, width / 2, height - 50);
      // text("File Size: "+file.size, width / 2, height - 30); 
    }

    const blobToB64 = (blob) => {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = reader.result;
          resolve(dataUrl);
        };
        reader.readAsDataURL(blob);
      });
    };

    function drawImage(base64Data) {
      background(255);
      var img;
      var raw = new Image();
      raw.src = base64Data;
      raw.onload = function () {
        img = createImage(raw.width, raw.height);
        img.drawingContext.drawImage(raw, 0, 0);
        image(img, 0, 0, 512, 512); // draw the image, etc here
      }
    }


  </script>
</body>

</html>
