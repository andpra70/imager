<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/addons/p5.sound.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/IDMNYU/p5.js-speech@0.0.3/lib/p5.speech.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
    <main>
    </main>
    <script>
let myButton;
let myClearButton;
let myDoodleNet;
let myCanvas;
let myResults;
let mySpeech;

function setup() {
  myCanvas = createCanvas(400, 400);
  background(255);
  strokeWeight(20);
  
  myButton = createButton('Guess');
  myButton.position(420, 0);
  myButton.mousePressed(guessDoodle);
  
  myClearButton = createButton('Clear');
  myClearButton.position(420, 100);
  myClearButton.mousePressed(clearCanvas);
  
  myDoodleNet = ml5.imageClassifier('DoodleNet');
  
  mySpeech = new p5.Speech();
}

function clearCanvas() {
  background(255);
}

function draw() {
  if (mouseIsPressed) {
    // circle(mouseX, mouseY, 10);
    line(pmouseX, pmouseY, mouseX, mouseY); 
  }
}

function mouseReleased() {
  myDoodleNet.classify(myCanvas, gotResults);
}

function guessDoodle() {
  myDoodleNet.classify(myCanvas, gotResults);
}

function gotResults(error, results) {
  if (results) {
    myResults = results;
    console.log('myResults', myResults);
    const thingsToSay = 'oh, I think it is ' + myResults[0].label;
    mySpeech.speak(thingsToSay);
  }
}

    </script>
  </body>
</html>
