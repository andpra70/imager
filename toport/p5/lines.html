<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
    <main>
    </main>
    <script>
let img;
let lines = 256; // Number of horizontal lines
let pointsPerLine = 512; // Number of points per line
let amp;

function preload() {
  img = loadImage("../img/tits0.jpg");
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  amp = height / lines;
  img.loadPixels();
  noFill();
}

function draw() {
  background("white");
  drawLines();
}

function drawLines() {
  let lineHeight = height / (lines + 1);
  for (let i = 1; i <= lines; i++) {
    let y = i * lineHeight;
    beginShape();
    drawPoints(y);
    endShape();
  }
}

function drawPoints(y) {
  let pointSpacing = width / (pointsPerLine + 1);
  for (let i = 1; i <= pointsPerLine; i++) {
    let x = i * pointSpacing;
    let offset = getVerticalOffset(x, y);
    vertex(x, y + offset);
  }
}

function getVerticalOffset(x, y) {
  let [imgX, imgY] = canvasToImageCoords(x, y);
  imgX = floor(imgX);
  imgY = floor(imgY);
  if (imgX < 0 || imgX > img.width - 1 || imgY < 0 || imgY > img.height - 1)
    return 0;
  let index = (imgY * img.width + imgX) * 4; // 4 channels (RGBA)

  let redValue = img.pixels[index];

  return map(redValue, 0, 255, -amp, 0);
}

function canvasToImageCoords(x, y) {
  x -= width / 2;
  y -= height / 2;
  let offsetX = (mouseX / width - 0.5) * width;
  let scale_ = (mouseY / height - 0.5) * 5;
  x -= offsetX;
  x /= scale_;
  y /= scale_;
  x += img.width / 2;
  y += img.height / 2;
  return [x, y];
}

    </script>
  </body>
</html>
