<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>

  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js" type="text/javascript"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/addons/p5.sound.min.js"></script>

  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />

</head>

<body>
  <main>
  </main>
  <script>

    let objectDetector;
    let img;
    let objects = [];
    let status;

    function preload() {
      img = loadImage('../img/car2.jpg');
    }


    function setup() {
      createCanvas(img.width, img.height);

      objectDetector = ml5.objectDetector('yolo', modelReady);

    }

    // Change the status when the model loads.
    function modelReady() {
      console.log("model Ready!")
      status = true;
      console.log('Detecting')
      objectDetector.detect(img, gotResult);
    }

    // A function to run when we get any errors and the results
    function gotResult(err, results) {
      if (err) {
        console.log(err);
      }
      console.log(results)
      objects = results;
    }


    function draw() {
      // unless the model is loaded, do not draw anything to canvas
      if (status != undefined) {
        image(img, 0, 0)

        for (let i = 0; i < objects.length; i++) {
          noStroke();
          fill(0, 255, 0);
          text(objects[i].label + " " + nfc(objects[i].confidence * 100.0, 2) + "%", objects[i].x + 5, objects[i].y + 15);
          noFill();
          strokeWeight(4);
          stroke(0, 255, 0);
          rect(objects[i].x, objects[i].y, objects[i].width, objects[i].height);
        }
      }
    }

  </script>
</body>

</html>
