<html>

<head>
  <meta charset="UTF-8" />
  <title>Facemesh with Webcam</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js" type="text/javascript"></script>

  <style></style>
</head>

<script>

  let facemesh;
  let video;
  let predictions = [];

  function setup() {
    createCanvas(640, 480);
    video = createCapture(VIDEO);
    video.size(width, height);

    facemesh = ml5.facemesh(video, modelReady);

    // This sets up an event that fills the global variable "predictions"
    // with an array every time new predictions are made
    facemesh.on("predict", results => {
      predictions = results;
    });

    // Hide the video element, and just show the canvas
    video.hide();
  }

  function modelReady() {
    console.log("Model ready!");
  }

  function draw() {
    image(video, 0, 0, width, height);

    // We can call both functions to draw all keypoints
    drawKeypoints();
  }

  // A function to draw ellipses over the detected keypoints
  function drawKeypoints() {
    for (let i = 0; i < predictions.length; i += 1) {
      const keypoints = predictions[i].scaledMesh;

      // Draw facial keypoints.
      for (let j = 0; j < keypoints.length; j += 1) {
        const [x, y] = keypoints[j];

        fill(0, 255, 0);
        ellipse(x, y, 5, 5);
      }
    }
  }



  // A simple Particle class
  var Particle = function (position) {
    this.acceleration = createVector(0, 0.1);
    this.velocity = createVector(random(-1, 1), random(-1, 0));
    this.position = position.copy();
    this.lifespan = 255.0;
  };

  Particle.prototype.run = function () {
    this.update();
    // this.display();
  };

  // Method to update position
  Particle.prototype.update = function () {
    this.velocity.add(this.acceleration);
    this.position.add(this.velocity);
    this.lifespan -= 2;
  };

  // Method to display
  Particle.prototype.display = function () {
    stroke(200, this.lifespan);
    strokeWeight(2);
    fill(255, 240, 0, this.lifespan);
    ellipse(this.position.x, this.position.y, 40, 40);
    fill(0);
    ellipse(this.position.x - 10, this.position.y - 6, 8, 8)
    ellipse(this.position.x + 10, this.position.y - 6, 8, 8)
    line(this.position.x - 10, this.position.y + 6, this.position.x + 10, this.position.y + 6)
  };

  // Is the particle still useful?
  Particle.prototype.isDead = function () {
    if (this.lifespan < 0) {
      return true;
    } else {
      return false;
    }
  };

  var ParticleSystem = function (position) {
    this.origin = position.copy();
    this.particles = [];
  };

  ParticleSystem.prototype.addParticle = function () {
    this.particles.push(new Particle(this.origin));
  };

  ParticleSystem.prototype.run = function () {
    for (var i = this.particles.length - 1; i >= 0; i--) {
      var p = this.particles[i];
      p.run();
      if (p.isDead()) {
        this.particles.splice(i, 1);
      }
    }
  };
</script>

<body>
  <h1>Facemesh with Webcam</h1>
</body>

</html>
