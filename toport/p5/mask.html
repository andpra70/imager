<!DOCTYPE html>
<html>

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.sound.min.js"></script>
    <script src="../js/simplify.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
        }
    </style>

</head>

<body>
    <script>
        let layer1;
        let bgImage;
        let path;

        class Pt {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.r = r;
            }
        }
        class Path {
            pts = [];
            constructor() {
            }
            addPt(pt) {
                this.pts.push(pt);
            }
            simplify() {
                simplify(this.pts, 3, true)
            }
            draw(layer,pt) {
                this.simplify();
                let i = 0;
                for (i = 1; i < this.pts.length; i++) {
                    let a = this.pts[i - 1];
                    let b = this.pts[i];
                    layer.fill(0, 0, 0, 1);
                    layer.stroke(0, 0, 0, 1);
                    layer.ellipse(a.x, a.y, a.r, a.r );
                }
            }
        }

        function preload() {
            bgImage = loadImage('../img/sofia.jpg');
        }

        function setup() {

            createCanvas(960, 960);
            background(0);
            noStroke();
            fill(255);

            console.log(width, height);
            colorMode(HSB, 360, 100, 100, 100);
            rectMode(CENTER);
            imageMode(CENTER);
            noStroke();
            fill(39, 35, 99);

            layer1 = createGraphics(width, height);
            layer1.clear();
            layer1.colorMode(HSB, 360, 100, 100, 100);
            layer1.rectMode(CENTER);
            layer1.fill(120);
            layer1.noStroke();
            layer1.imageMode(CENTER);

            slider = createSlider(0, 255);
            slider.position(10, 10);
            slider.size(80);
            // pixelDensity(1);

            path=new Path();
        }

        function draw() {
            background(0);

            let radius = slider.value();
            fill(255);
            text('r=' + radius, 50, 10);
            text('l=' + path.pts.length, 50, 40);

            image(bgImage, width / 2, height / 2);

            ellipse(mouseX, mouseY, 50, 50, 10);

            // Draw only when mouse is pressed
            if (mouseIsPressed === true && mouseX > 100) {

                // const lastPt = path.pts[path.pts.length - 1]

                path.addPt(new Pt(mouseX, mouseY, radius));

                path.draw(layer1);
            }

            layer1.fill(0, 0, 0, 2);
            ellipse(mouseX, mouseY, radius, radius, 10);

            // layer1.background(199, 80, 88);
            image(layer1, width / 2, height / 2);
        }

    </script>
</body>

</html>
