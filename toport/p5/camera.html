<!DOCTYPE html>
<html>

<head>

  <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.sound.min.js"></script>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }

    canvas {
      display: block;
    }
  </style>

</head>

<body>
  <script>

    ////original Sketch:
    // coding question from @JakeWelsh



    let cam;
    let graphics;
    let nagoda;
    let txt = "I AM";
    let mask;
    let w=1920/2;
    let h=1080/2;

    function preload() {
      // font = loadFont("Arial.ttf");
    }

    function setup() {
      createCanvas(w, h);
      cam = createCapture(VIDEO);
      cam.hide();
      graphics = createGraphics(w, h);
    }

    function draw() {


      background(255);

      graphics.clear();
      // graphics.textFont(font);
      graphics.textAlign(CENTER, CENTER);
      graphics.textSize(width * 0.35);
      graphics.fill(0);
      graphics.text(txt, width / 2, height / 2);


      mask = graphics.get();
      let camBuffer = cam.get();
      ////you need to resize the camBuffer image to the sketch size
      camBuffer.resize(width, height);
      camBuffer.mask(mask);

      image(camBuffer, 0, 0, width, height);
      //   image(mask,0,0);
    }


  </script>
</body>

</html>
