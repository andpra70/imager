<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>

  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />

</head>

<body>
  <main>
  </main>
  <script>

    let poseNet;
    let myVideo;
    let myResults;
    let latestNoses = [];

    function setup() {
      myVideo = createCapture(VIDEO);
      myVideo.hide();
      createCanvas(640, 480);
      poseNet = ml5.poseNet(myVideo, gotModel);
      noStroke();
      fill(155, 20, 200);
    }

    function gotModel() {
      poseNet.on('pose', gotResults);
    }

    function gotResults(results) {
      if (results) {
        myResults = results;
        if (myResults[0]) {
          const nose = myResults[0].pose.nose;
          latestNoses.push(nose);
          if (latestNoses.length > 50) {
            latestNoses.shift();
          }
        }

      }
    }

    function draw() {
      image(myVideo, 0, 0, width, height);

      for (let i = 0; i < latestNoses.length; i++) {
        fill(`rgba(155, 20, 200, ${i / 50})`);
        ellipse(latestNoses[i].x, latestNoses[i].y, 5 + i * 1, 5 + i * 1);
      }

    }





  </script>
</body>

</html>
