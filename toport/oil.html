<html>

<style>
    body {
        text-align: center;
        background: #ececec;
        font-family: Tahoma, Geneva, sans-serif
    }

    section {
        display: inline-block
    }

    canvas {
        border: 1px solid #000
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.5/dat.gui.min.js"></script>

<body>

    <section>
        <h2>Original</h2>
        <canvas id="canvas"></canvas>
    </section>
    <section>
        <h2>Oil Painting Effect</h2>
        <canvas id="dest-canvas"></canvas>
    </section>

    <script>
        var canvas = document.getElementById("canvas"),
            ctx = canvas.getContext("2d"),
            destCanvas = document.getElementById("dest-canvas"),
            img = new Image();

        var TOOL = {
            id: "oil-paint",
            source: {
                url: "./img/mm4.jpg",
                crossOrigin: "Anonymous"
            },
            params: {
                radius: 6,
                intensity: 10
            },
            defaults: {
                radius: 6,
                intensity: 10
            },
            state: {
                isImageLoaded: false,
                lastRenderMs: 0
            },
            actions: {
                apply: function () {
                    doOilPaintEffect();
                },
                reset: function () {
                    TOOL.params.radius = TOOL.defaults.radius;
                    TOOL.params.intensity = TOOL.defaults.intensity;
                    radiusCtrl.updateDisplay();
                    intensityCtrl.updateDisplay();
                    doOilPaintEffect();
                }
            }
        };

        img.addEventListener('load', function () {
            // reduced the size by half for pen and performance.
            canvas.width = (this.width );
            canvas.height = (this.height );
            destCanvas.width = this.width;
            destCanvas.height = this.height;
            ctx.drawImage(this, 0, 0, canvas.width, canvas.height);
            TOOL.state.isImageLoaded = true;
            doOilPaintEffect();
        });

        img.crossOrigin = TOOL.source.crossOrigin;
        img.src = TOOL.source.url;

        var gui = new dat.GUI();
        var paramsFolder = gui.addFolder("TOOL.params");
        var intensityCtrl = paramsFolder.add(TOOL.params, "intensity", 1, 50).step(1).name("intensity");
        var radiusCtrl = paramsFolder.add(TOOL.params, "radius", 1, 20).step(1).name("radius");
        paramsFolder.open();
        gui.add(TOOL.actions, "apply").name("TOOL.apply");
        gui.add(TOOL.actions, "reset").name("TOOL.reset");

        function doOilPaintEffect() {
            if (!TOOL.state.isImageLoaded) return;

            var startedAt = performance.now();
            oilPaintEffect({
                sourceCanvas: canvas,
                destinationCanvas: destCanvas,
                radius: TOOL.params.radius,
                intensity: TOOL.params.intensity
            });
            TOOL.state.lastRenderMs = Math.round(performance.now() - startedAt);
        }

        function oilPaintEffect(config) {
            var sourceCanvas = config.sourceCanvas,
                destinationCanvas = config.destinationCanvas,
                width = sourceCanvas.width,
                height = sourceCanvas.height,
                imgData = ctx.getImageData(0, 0, width, height),
                pixData = imgData.data,
                radius = config.radius,
                intensity = config.intensity,
                pixelIntensityCount = [];

            destinationCanvas.width = width;
            destinationCanvas.height = height;
            var destinationCtx = destinationCanvas.getContext("2d");

            var destImageData = destinationCtx.createImageData(width, height),
                destPixData = destImageData.data,
                intensityLUT = [],
                rgbLUT = [];

            for (var y = 0; y < height; y++) {
                intensityLUT[y] = [];
                rgbLUT[y] = [];
                for (var x = 0; x < width; x++) {
                    var idx = (y * width + x) * 4,
                        r = pixData[idx],
                        g = pixData[idx + 1],
                        b = pixData[idx + 2],
                        avg = (r + g + b) / 3;

                    intensityLUT[y][x] = Math.round((avg * intensity) / 255);
                    rgbLUT[y][x] = {
                        r: r,
                        g: g,
                        b: b
                    };
                }
            }


            for (y = 0; y < height; y++) {
                for (x = 0; x < width; x++) {
                    pixelIntensityCount = [];

                    // Find intensities of nearest pixels within radius.
                    for (var yy = -radius; yy <= radius; yy++) {
                        for (var xx = -radius; xx <= radius; xx++) {
                            if (y + yy > 0 && y + yy < height && x + xx > 0 && x + xx < width) {
                                var intensityVal = intensityLUT[y + yy][x + xx];

                                if (!pixelIntensityCount[intensityVal]) {
                                    pixelIntensityCount[intensityVal] = {
                                        val: 1,
                                        r: rgbLUT[y + yy][x + xx].r,
                                        g: rgbLUT[y + yy][x + xx].g,
                                        b: rgbLUT[y + yy][x + xx].b
                                    }
                                } else {
                                    pixelIntensityCount[intensityVal].val++;
                                    pixelIntensityCount[intensityVal].r += rgbLUT[y + yy][x + xx].r;
                                    pixelIntensityCount[intensityVal].g += rgbLUT[y + yy][x + xx].g;
                                    pixelIntensityCount[intensityVal].b += rgbLUT[y + yy][x + xx].b;
                                }
                            }
                        }
                    }

                    pixelIntensityCount.sort(function (a, b) {
                        return b.val - a.val;
                    });

                    var curMax = pixelIntensityCount[0].val,
                        dIdx = (y * width + x) * 4;

                    destPixData[dIdx] = ~~(pixelIntensityCount[0].r / curMax);
                    destPixData[dIdx + 1] = ~~(pixelIntensityCount[0].g / curMax);
                    destPixData[dIdx + 2] = ~~(pixelIntensityCount[0].b / curMax);
                    destPixData[dIdx + 3] = 255;
                }
            }

            // change this to ctx to instead put the data on the original canvas
            destinationCtx.putImageData(destImageData, 0, 0);
        }
    </script>
</body>

</html>
