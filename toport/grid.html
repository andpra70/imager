<html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"
  integrity="sha512-M7nHCiNUOwFt6Us3r8alutZLm9qMt4s9951uo8jqO4UwJ1hziseL6O3ndFyigx6+LREfZqnhHxYjKRJ8ZQ69DQ=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>


<body>

</body>

<script>

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
const img = new Image();
img.src = './img/mona.png';
img.onload = function() {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  generatePositionalGrid();
};

function generatePositionalGrid() {
  const gridSize = 256; // Dimensione della griglia (numero di celle per riga/colonna)
  const cellSize = canvas.width / gridSize;

  const gridCanvas = document.createElement('canvas');
  gridCanvas.width = canvas.width;
  gridCanvas.height = canvas.height;
  const gridCtx = gridCanvas.getContext('2d');

  for (let y = 0; y < gridSize; y++) {
    for (let x = 0; x < gridSize; x++) {
      const cellX = x * cellSize;
      const cellY = y * cellSize;

      const pixel = ctx.getImageData(cellX, cellY, 1, 1).data;
      const grayValue = (pixel[0] + pixel[1] + pixel[2]) / 3;

      const xOffset = (grayValue / 255) * cellSize * 2 - cellSize; // Proporzionale alla luminanza
      const yOffset = (grayValue / 255) * cellSize * 2 - cellSize;

      gridCtx.fillStyle = 'black';
      gridCtx.fillRect(cellX + xOffset, cellY + yOffset, 1, 1);
    }
  }

  // Inserisci la griglia nel DOM o esegui altre operazioni
  document.body.appendChild(gridCanvas);
}


</script>

</html>
