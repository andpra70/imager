<html>
<script src="./js/imagetracer.1.2.6.js"></script>

<body>
	<svg id="svgcontainer" width="100%" height="100%"></svg>
</body>



<script>

	// Loading an image, tracing with the 'posterized2' option preset, and appending the SVG to an element with id="svgcontainer"
	ImageTracer.imageToSVG(

		'./img/legs1.jpg', /* input filename / URL */

		function (svgstr) {
			ImageTracer.appendSVGString(svgstr, 'svgcontainer');
		}, /* callback function to run on SVG string result */

		{

			// Tracing
			corsenabled: false,
			ltres: .1,
			qtres: .1,
			pathomit: 2,
			rightangleenhance: true,

			// Color quantization
			colorsampling: 2,
			numberofcolors: 16,
			mincolorratio: 0,
			colorquantcycles: 4,

			// Layering method
			layering: 0,

			// SVG rendering
			strokewidth: 1,
			linefilter: true,
			scale: 1,
			roundcoords: 1,
			viewbox: false,
			desc: true,
			lcpr: 0,
			qcpr: 0,

			// Blur
			blurradius: 1,
			blurdelta: 20,

			palZ: [{ r: 0, g: 0, b: 0, a: 255 }, { r: 0, g: 0, b: 255, a: 255 }, { r: 255, g: 255, b: 0, a: 255 }]
		},

	);


</script>

</html>
